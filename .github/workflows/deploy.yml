```yml
name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Lint PHP files
        run: |
          find . -name '*.php' -not -path './.git/*' -print0 | xargs -0 -n1 php -l

  deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.DO_SSH_PRIVATE_KEY }}' > ~/.ssh/do_key
          chmod 600 ~/.ssh/do_key
          ssh-keyscan -H ${{ secrets.DO_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -i ~/.ssh/do_key \
            -o StrictHostKeyChecking=no \
            root@${{ secrets.DO_SSH_HOST }} \
            "echo SSH SUCCESS"

      - name: Deploy files
        shell: bash
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'setup_db.php' \
            -e "ssh -i ~/.ssh/do_key -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.DO_SSH_HOST }}:/var/www/rare-stone/

      - name: Fix permissions
        shell: bash
        run: |
          ssh -i ~/.ssh/do_key \
            root@${{ secrets.DO_SSH_HOST }} \
            "chown -R www-data:www-data /var/www/rare-stone && \
            chmod -R 755 /var/www/rare-stone && \
            systemctl restart apache2"
```
