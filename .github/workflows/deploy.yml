name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Lint PHP files
        run: |
          find . -name '*.php' -not -path './.git/*' -print0 | xargs -0 -n1 php -l

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/do_key
          chmod 600 ~/.ssh/do_key
          ssh-keyscan -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/do_key -o StrictHostKeyChecking=no root@${{ secrets.DO_SSH_HOST }} "echo SSH SUCCESS"

      - name: Sync files to droplet
        env:
          SSH_USER: ${{ secrets.DO_SSH_USER }}
          SSH_HOST: ${{ secrets.DO_SSH_HOST }}
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'setup_db.php' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/do_key -o StrictHostKeyChecking=yes" \
            ./ "${SSH_USER}@${SSH_HOST}:~/"